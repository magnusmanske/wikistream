<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Vintage warm gradient for background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <!-- Film strip accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2b714"/>
      <stop offset="100%" style="stop-color:#f0c644"/>
    </linearGradient>
    <!-- Subtle glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e2b714;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#e2b714;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <g clip-path="url(#roundedSquare)">
    <rect width="512" height="512" fill="url(#bgGrad)"/>
    <!-- Subtle radial glow -->
    <circle cx="256" cy="256" r="280" fill="url(#glow)"/>

    <!-- Film strip left side -->
    <g fill="#e2b714" opacity="0.25">
      <!-- Left sprocket holes -->
      <rect x="24" y="40" width="28" height="20" rx="4"/>
      <rect x="24" y="80" width="28" height="20" rx="4"/>
      <rect x="24" y="120" width="28" height="20" rx="4"/>
      <rect x="24" y="160" width="28" height="20" rx="4"/>
      <rect x="24" y="200" width="28" height="20" rx="4"/>
      <rect x="24" y="240" width="28" height="20" rx="4"/>
      <rect x="24" y="280" width="28" height="20" rx="4"/>
      <rect x="24" y="320" width="28" height="20" rx="4"/>
      <rect x="24" y="360" width="28" height="20" rx="4"/>
      <rect x="24" y="400" width="28" height="20" rx="4"/>
      <rect x="24" y="440" width="28" height="20" rx="4"/>
      <!-- Right sprocket holes -->
      <rect x="460" y="40" width="28" height="20" rx="4"/>
      <rect x="460" y="80" width="28" height="20" rx="4"/>
      <rect x="460" y="120" width="28" height="20" rx="4"/>
      <rect x="460" y="160" width="28" height="20" rx="4"/>
      <rect x="460" y="200" width="28" height="20" rx="4"/>
      <rect x="460" y="240" width="28" height="20" rx="4"/>
      <rect x="460" y="280" width="28" height="20" rx="4"/>
      <rect x="460" y="320" width="28" height="20" rx="4"/>
      <rect x="460" y="360" width="28" height="20" rx="4"/>
      <rect x="460" y="400" width="28" height="20" rx="4"/>
      <rect x="460" y="440" width="28" height="20" rx="4"/>
    </g>

    <!-- Central film reel circle -->
    <circle cx="256" cy="256" r="170" fill="none" stroke="#e2b714" stroke-width="4" opacity="0.3"/>
    <circle cx="256" cy="256" r="140" fill="none" stroke="#e2b714" stroke-width="2" opacity="0.15"/>

    <!-- Reel spokes (subtle) -->
    <g stroke="#e2b714" stroke-width="2" opacity="0.12">
      <line x1="256" y1="86" x2="256" y2="426"/>
      <line x1="86" y1="256" x2="426" y2="256"/>
      <line x1="136" y1="136" x2="376" y2="376"/>
      <line x1="376" y1="136" x2="136" y2="376"/>
    </g>

    <!-- Inner hub circle -->
    <circle cx="256" cy="256" r="45" fill="none" stroke="#e2b714" stroke-width="3" opacity="0.25"/>

    <!-- Play triangle — the hero element -->
    <polygon points="220,175 220,337 350,256" fill="url(#accentGrad)" opacity="0.95"/>

    <!-- Thin highlight on play button -->
    <polygon points="220,175 220,337 350,256" fill="none" stroke="#fff" stroke-width="2" opacity="0.15"/>
  </g>
</svg>
